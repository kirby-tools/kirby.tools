title: Kirby Copilot – AI Content Generation Plugin for Kirby CMS
description: AI-powered content generation plugin for Kirby CMS. Generate layouts, text, and structured content directly in the Kirby Panel with GPT, Claude, or Gemini.
navigation.icon: i-ri-sparkling-line
hero:
  headline:
    label: "New: Public PHP API"
    to: /docs/copilot/php-classes
    icon: i-ri-terminal-box-line
    color: neutral
    variant: solid
  title: '<span class="primary-500">AI-Powered</span><br> Content Generation'
  description: Generate entire layouts from your custom blocks, refine text with<br class="hidden lg:block"> inline suggestions, or let AI complete your thoughts as you type.
  links:
    - label: Try Copilot Yourself
      trailingIcon: i-ri-arrow-right-line
      to: /docs/copilot/getting-started/installation
      size: xl
sections:
  - title: Generate Content for<br> <span class="text-primary">Multiple Panel Fields</span>
    slot: video
    video:
      src: /vid/kirby-copilot-multi-fields-generation.mp4
      poster: /vid/kirby-copilot-multi-fields-generation-poster-start.jpg
      label: Demonstration of generating many fields at once in the Kirby Panel
  - title: Bring Context to Your<br class="hidden lg:block"> <span class="text-primary">Prompt Party</span>
    slot: features
    features:
      - title: Inline Suggestions
        description: Ghost text appears after a brief pause. Press Tab to accept.
        icon: i-ri-magic-line
        to: /docs/copilot/usage/inline-suggestions
      - title: Multi-Field Generation
        description: Select fields in the prompt dialog and generate their content from a single prompt. It just works™.
        icon: i-ri-list-check-2
        to: /docs/copilot/usage/view-button
      - title: Structure-Aware Generation
        description: Generate entire layouts from a single prompt, based on your project's unique block definitions.
        icon: i-ri-dashboard-line
        to: /docs/copilot/advanced/blocks-and-layouts
      - title: In-Context Editing
        description: Use the Copilot button in writer/textarea fields to refine text with AI assistance. Works perfectly with selected text.
        icon: i-ri-input-cursor-move
        to: /docs/copilot/usage/toolbar-buttons
      - title: Prompt Templates
        description: Tailor AI responses with user instructions. Save frequently used prompts as templates for quick access.
        icon: i-ri-bookmark-line
        to: /docs/copilot/prompt-dialog/templates
      - title: Rich Context
        description: Go beyond text. Use other fields, images, and even PDF documents as context for more accurate and relevant AI responses.
        icon: i-ri-braces-line
        to: /docs/copilot/prompt-dialog/placeholders
  - title: AI Text Editing with<br> <span class="text-primary">Templates & Suggestions</span>
    slot: video
    video:
      src: /vid/kirby-copilot-writer-features.mp4
      poster: /vid/kirby-copilot-writer-features-poster-start.jpg
      label: Applying prompt templates to fix grammar and make text concise, followed by inline suggestions in a writer field
  - title: Generate Kirby Layouts<br> <span class="text-primary">From Custom Blocks</span>
    slot: video
    video:
      src: /vid/kirby-copilot-generate-layouts.mp4
      poster: /vid/kirby-copilot-generate-layouts-poster-start.jpg
      label: Demonstration of generating layouts directly in the Kirby Panel
  - title: Drive Copilot<br> From <span class="text-primary">PHP</span>
    id: php-api
    slot: code
    orientation: horizontal
    reverse: true
    description: Call AI providers from CLI commands, hooks, or custom workflows. The same Client that powers the Panel is available to your code.
    features:
      - title: Hooks & CLI
        description: Generate content on save or in batch from the command line
        icon: i-ri-terminal-box-line
      - title: Two Output Modes
        description: Plain text or structured objects validated against a JSON schema
        icon: i-ri-code-line
    links:
      - label: PHP API Reference
        to: /docs/copilot/php-classes
        trailingIcon: i-ri-arrow-right-line
        variant: subtle
    code:
      minHeight: 360px
      files:
        - filename: site/commands/generate-meta-descriptions.php
          language: php
          content: |
            use JohannSchopplich\Copilot\AI\Client;
            use Kirby\CLI\CLI;

            return [
                'description' => 'Generate missing meta descriptions for blog posts',
                'command' => static function (CLI $cli): void {
                    $client = Client::instance();

                    foreach (page('blog')->children() as $post) {
                        if ($post->meta_description()->isNotEmpty()) {
                            continue;
                        }

                        $description = $client->generateText([
                            ['role' => 'system', 'content' => 'Write a 155-character SEO description.'],
                            ['role' => 'user', 'content' => $post->text()->kirbytext()],
                        ]);

                        $post->update(['meta_description' => $description]);
                        $cli->out('✓ ' . $post->title());
                    }

                    $cli->success('Done');
                }
            ];
        - filename: Terminal
          language: bash
          content: |
            kirby generate-meta-descriptions
cta:
  title: Do Not Take<br class="md:hidden"> Our Word for It
  description: Install the plugin and try Copilot in the Panel yourself.
  links:
